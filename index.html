<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Tienda Tech - Carrito de Compras</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="header-container">
            <h1 class="logo">💻 TechStore</h1>
            <button class="cart-toggle" id="cartToggle" aria-label="Abrir carrito">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>


    <main class="main-content">
        <section class="products-section">
            <h2 class="section-title">Nuestros Productos</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Los productos se renderizan aquí -->
            </div>
        </section>
    </main>

    <!-- Carrito Sidebar -->
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>🛒 Tu Carrito</h2>
            <button class="cart-close" id="cartClose" aria-label="Cerrar carrito">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="cart-items" id="cartItems">
            <!-- Items del carrito -->
        </div>

        <div class="cart-footer">
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="cartSubtotal">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="cartTotal">$0.00</span>
                </div>
            </div>
            <div class="cart-actions">
                <button class="btn btn-primary" id="checkoutBtn">Finalizar Compra</button>
                <button class="btn btn-secondary" id="clearCartBtn">Vaciar Carrito</button>
            </div>
        </div>
    </aside>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script src="js/app.js"></script>
    <script src="js/app-browser.js"></script>
</body>

</html>
